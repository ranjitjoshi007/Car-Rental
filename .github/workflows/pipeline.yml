name: Car Rental CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Deploy JAR
        run: |
          echo "📦 Copying JAR to /opt/myapp/"
          cp target/Car-Rental-0.0.1-SNAPSHOT.jar /opt/myapp/app.jar
          echo "🔄 Restarting service..."
          sudo systemctl restart myapp.service
          echo "✅ Deployment complete!"

      - name: Verify app is running
        run: |
          sleep 5
          sudo systemctl status myapp.service --no-pager